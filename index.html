<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お問い合わせ</title>

<script src="https://www.google.com/recaptcha/api.js"></script>

<style>
/* ===== reCAPTCHAまわり ===== */
.recaptcha-wrapper {
  margin-top: 10px;
}

.recaptcha-error {
  color: red;
  font-size: 13px;
  margin-bottom: 6px;
  display: none;
}

.recaptcha-box {
  display: inline-block; /* ← 横長防止の本体 */
}

.recaptcha-box.error {
  border: 2px solid red;
  padding: 6px;
  border-radius: 4px;
}

/* ===== ボタン ===== */
.submit-btn {
  margin-top: 16px;
  padding: 10px 16px;
  background: #0070d2;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.submit-btn:hover {
  background: #005bb5;
}
</style>

<script>
/* ===== Salesforce用 timestamp ===== */
function updateTimestamp() {
  var response = document.getElementById("g-recaptcha-response");
  var settings = document.getElementsByName("captcha_settings")[0];

  if (!settings) return;

  if (!response || response.value.trim() === "") {
    var elems = JSON.parse(settings.value);
    elems["ts"] = new Date().getTime();
    settings.value = JSON.stringify(elems);
  }
}

document.addEventListener("DOMContentLoaded", function () {
  setInterval(updateTimestamp, 500);
});

/* ===== フロントチェック ===== */
function checkRecaptcha() {
  var el = document.getElementById("g-recaptcha-response");
  var error = document.getElementById("recaptcha-error");
  var box = document.getElementById("recaptcha-container");

  if (!el || el.value.trim() === "") {
    error.style.display = "block";
    box.classList.add("error");
    box.scrollIntoView({ behavior: "smooth", block: "center" });
    return false;
  }

  error.style.display = "none";
  box.classList.remove("error");
  return true;
}
</script>

</head>

<body>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00Dg5000008isoU"
      method="POST"
      onsubmit="return checkRecaptcha();">

<input type="hidden" name="captcha_settings"
  value='{"keyname":"developer","fallback":"true","orgId":"00Dg5000008isoU","ts":""}'>
<input type="hidden" name="orgid" value="00Dg5000008isoU">
<input type="hidden" name="retURL" value="https://test04301008.github.io/test-reCAPCHA/">

<label>取引先責任者名</label><br>
<input type="text" name="name"><br>

<label>メール</label><br>
<input type="text" name="email"><br>

<label>電話</label><br>
<input type="text" name="phone"><br>

<label>件名</label><br>
<input type="text" name="subject"><br>

<label>説明</label><br>
<textarea name="description"></textarea><br>

<input type="hidden" name="external" value="1">

<div class="recaptcha-wrapper">
  <div id="recaptcha-error" class="recaptcha-error">
    reCAPTCHAの確認が必要です
  </div>

  <div id="recaptcha-container" class="recaptcha-box">
    <div class="g-recaptcha"
      data-sitekey="6LeRStEsAAAAAMroC_FfRYYtQzJ_GxKByNOlJdEe"></div>
  </div>
</div>

<br>
<button type="submit" class="submit-btn">送信</button>

</form>

</body>
</html>
